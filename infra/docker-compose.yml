services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: adds-backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../traces:/app/traces

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: adds-frontend
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

