services:
  - type: web
    name: adds-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBMED_EMAIL
        sync: false
      - key: PUBMED_TOOL
        value: agentic-diagnostic-support
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: USE_REMOTE_MODELS
        value: "true"
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: VECTOR_STORE_PATH
        value: /var/data/indexes/medical_index
      - key: CASE_STORE_PATH
        value: /var/data/cases.json
      - key: TRACE_LOG_PATH
        value: /var/data/traces/agent_logs.jsonl
    disk:
      name: persistent-data
      mountPath: /var/data
      sizeGB: 5
